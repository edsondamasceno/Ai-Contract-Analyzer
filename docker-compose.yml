version: '3.8'
services:
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
  db:
    image: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: contracts
  redis:
    image: redis
  worker:
    build: .
    command: celery -A worker.celery_worker worker --loglevel=info
    depends_on:
      - redis
